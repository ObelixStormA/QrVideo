; Shared hosting (cPanel/PHP-FPM) uchun upload limitlarini oshirish.
; Bu fayl faqat public/ documentroot orqali PHP-FPM/CGI ishlatilganda o'qiladi.
; O'zgarishlar darhol emas, PHP-FPM cache tugagach (odatda ~5 daqiqa, user_ini.cache_ttl) kuchga kiradi.

upload_max_filesize = 512M
post_max_size = 550M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
