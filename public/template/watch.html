<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video ko'rish — YouTube — Uzbekistan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
/* ---------- WATCH PAGE ---------- */
.watch-main {
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.player-wrapper {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
  border-radius: var(--border-radius-md);
  overflow: hidden;
}
.player-wrapper video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: #000;
}

.watch-title {
  font-size: 20px;
  font-weight: 600;
  margin: 16px 0 12px;
  line-height: 1.35;
}

.watch-description {
  background: var(--bg-chip);
  border-radius: var(--border-radius-md);
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.5;
}
.watch-description .desc-stats {
  font-weight: 500;
  margin-bottom: 6px;
}
.watch-description .desc-text {
  color: var(--text-primary);
}

@media (max-width: 991.98px) {
  .watch-main { padding: 12px 16px 72px; }
}
</style>
</head>
<body>

<nav class="yt-navbar" id="navbar">
  <div class="navbar-left">
    <button class="hamburger-btn" id="hamburgerBtn" title="Menyu"><i class="fas fa-bars"></i></button>
    <a class="navbar-brand" href="youtube-platform-template.html">
      <img src="1.png" alt="Logo">
      <span>Video</span>

    </a>
  </div>

  <div class="navbar-center">

      <input type="search" placeholder="Qidirish" class="search-input" id="searchInput">

  </div>

  <div class="navbar-right">
    <button class="icon-btn" id="themeToggle" title="Mavzu almashtirish"><i class="fas fa-circle-half-stroke"></i></button>
  </div>
</nav>

<div class="yt-wrapper">

  <aside class="yt-sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="nav-item"><i class="fas fa-home"></i><span class="nav-label">Bosh sahifa</span></div>
    </div>
    <div class="sidebar-section">
      <div class="section-title">Tarixiy shaxslar</div>
      <div class="nav-item"><i class="fas fa-fire"></i><span class="nav-label">Trend</span></div>
      <div class="nav-item"><i class="fas fa-bag-shopping"></i><span class="nav-label">Shopping</span></div>
      <div class="nav-item"><i class="fas fa-music"></i><span class="nav-label">Musiqa</span></div>
      <div class="nav-item"><i class="fas fa-gamepad"></i><span class="nav-label">Gaming</span></div>
      <div class="nav-item"><i class="fas fa-newspaper"></i><span class="nav-label">Yangiliklar</span></div>
      <div class="nav-item"><i class="fas fa-trophy"></i><span class="nav-label">Sport</span></div>
    </div>
    <div class="sidebar-section">
      <div class="section-title">Obunalar</div>
      <div class="nav-item"><i class="fas fa-user-circle"></i><span class="nav-label">Dasturlash Akademiyasi</span></div>
      <div class="nav-item"><i class="fas fa-user-circle"></i><span class="nav-label">Oshxona Sirlari</span></div>
      <div class="nav-item"><i class="fas fa-user-circle"></i><span class="nav-label">Tabiat Dunyosi</span></div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="overlay"></div>

  <main class="yt-main" id="mainContent">
    <div class="watch-main">
      <div class="player-wrapper">
        <video id="videoPlayer" controls autoplay poster="">
          Brauzeringiz video formatini qo'llab-quvvatlamaydi.
        </video>
      </div>

      <h1 class="watch-title" id="watchTitle"></h1>

      <div class="watch-description">
        <p class="desc-stats" id="watchStats"></p>
        <p class="desc-text" id="watchDescription"></p>
      </div>
    </div>
  </main>

</div>

<nav class="mobile-bottom-nav d-flex">
  <a class="mobile-nav-item" href="youtube-platform-template.html">
    <i class="fas fa-home"></i><span>Bosh sahifa</span>
  </a>
  <a class="mobile-nav-item">
    <i class="fas fa-film"></i><span>Shorts</span>
  </a>
  <a class="mobile-nav-item">
    <div class="create-icon">+</div>
  </a>
  <a class="mobile-nav-item">
    <i class="fas fa-tv"></i><span>Obunalar</span>
  </a>
  <a class="mobile-nav-item">
    <i class="fas fa-photo-film"></i><span>Kutubxona</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="videos-data.js"></script>
<script>
const sidebar = document.getElementById('sidebar');
const mainContent = document.getElementById('mainContent');
const overlay = document.getElementById('overlay');
const hamburgerBtn = document.getElementById('hamburgerBtn');

function isMobile() { return window.innerWidth < 992; }

function toggleSidebar() {
  if (isMobile()) {
    const isOpen = sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  } else {
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
  }
}

function closeMobileSidebar() {
  overlay.classList.remove('active');
  sidebar.classList.remove('mobile-open');
  document.body.style.overflow = '';
}

hamburgerBtn.addEventListener('click', toggleSidebar);
overlay.addEventListener('click', closeMobileSidebar);

window.addEventListener('resize', () => {
  if (!isMobile()) closeMobileSidebar();
});

function formatViews(count) {
  if (count >= 1_000_000) return (count / 1_000_000).toFixed(1) + 'M';
  if (count >= 1_000) return (count / 1_000).toFixed(1) + 'K';
  return count.toString();
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  const intervals = [
    [31536000, 'yil'], [2592000, 'oy'],
    [86400, 'kun'], [3600, 'soat'],
    [60, 'daqiqa'], [1, 'soniya']
  ];
  for (const [secs, label] of intervals) {
    const count = Math.floor(seconds / secs);
    if (count >= 1) return `${count} ${label} oldin`;
  }
  return 'Hozir';
}

const params = new URLSearchParams(window.location.search);
const videoId = parseInt(params.get('v'), 10);
const video = videosData.find(v => v.id === videoId) || videosData[0];

if (video) {
  document.title = `${video.title} — YouTube — Uzbekistan`;
  document.getElementById('videoPlayer').src = video.videoUrl;
  document.getElementById('videoPlayer').poster = video.thumbnail;
  document.getElementById('watchTitle').textContent = video.title;
  document.getElementById('watchStats').textContent = `${formatViews(video.views)} ko'rishlar • ${timeAgo(video.date)}`;
  document.getElementById('watchDescription').textContent = video.description || '';
}

const themeToggle = document.getElementById('themeToggle');
const htmlEl = document.documentElement;
themeToggle.addEventListener('click', () => {
  const current = htmlEl.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  htmlEl.setAttribute('data-theme', next);
  localStorage.setItem('yt-theme', next);
});
const savedTheme = localStorage.getItem('yt-theme') || 'dark';
htmlEl.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
